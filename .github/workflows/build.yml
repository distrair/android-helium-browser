name: Build Helium Browser (Depot Remote Execution)

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest-8-cores
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Depot CLI
        uses: depot/setup-action@v1

      - name: Free Disk Space (Only needed for GitHub runners)
        if: runner.environment == 'github-hosted'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Setup Depot Tools (Chromium toolchain)
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$(pwd)/depot_tools" >> $GITHUB_PATH

      - name: Fetch Chromium Source & Apply Patches
        run: |
          # This script is specific to your Helium project
          python3 clone.py

      - name: Generate Ninja Build Files
        working-directory: src
        run: |
          gn gen out/Default --args='target_os="android" target_cpu="arm64" is_debug=false'

      - name: Build with Depot Remote Execution
        env:
          DEPOT_PROJECT_ID: ${{ secrets.DEPOT_PROJECT_ID }}
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
        working-directory: src
        run: |

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Helium-Browser-APK
          path: src/out/Default/apks/*.apk
